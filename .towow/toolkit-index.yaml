schema_version: "1.0"
purpose: |
  Pull-surface index of .towow/ tooling that is not auto-triggered by hooks. Replaces the
  SessionStart push-reminder (session-start-toolkit-reminder.py, retired WP-031). A new
  operator — human or external consumer importing the substrate in WP-040 — can discover
  these capabilities via `/toolkit` without needing to grep the repo.
last_updated: "2026-04-19"
updated_by_wp: "WP-032"

entries:
  # Entry #1 from the retired reminder. trace-analyzer still writes proposals; this is the read side.
  - id: trace-analyzer-proposals
    name: "Review trace-analyzer proposals"
    category: proposals
    status: active
    purpose: |
      SessionEnd trace-analyzer.py writes findings under .towow/proposals/ but does not act on
      them. High-confidence (>= 0.8) findings warrant opening an issue under docs/issues/.
    invocation: "ls -lt .towow/proposals/ | head -5"
    source_hook: ".claude-v2/settings.json SessionEnd → scripts/hooks/trace-analyzer.py analyze"
    notes: |
      Silent when empty. If anything listed, read the file, and if confidence >= 0.8 open an
      issue ticket or a retirement packet depending on the finding type.

  # Entry #2. Script still exists; receiver was only the reminder before.
  - id: magic-doc-rebuild
    name: "Rebuild magic docs (after source changed)"
    category: docs
    status: active
    purpose: |
      Rebuilds auto-generated documentation from source-of-truth inputs. Run when you've
      changed a file that feeds a magic doc (check_doc_freshness will tell you which).
    invocation:
      rebuild: "python3 scripts/checks/regenerate_magic_docs.py all"
      check_only: "python3 scripts/checks/regenerate_magic_docs.py all --check"
    source_script: "scripts/checks/regenerate_magic_docs.py"

  # Entry #3.
  - id: doc-freshness-check
    name: "Full doc freshness scan"
    category: docs
    status: active
    purpose: |
      Detects drift between source inputs and magic docs across the repo.
    invocation: "python3 scripts/checks/check_doc_freshness.py"
    source_script: "scripts/checks/check_doc_freshness.py"

  # Entry #4. The capability itself is retired on the vNext path.
  - id: mid-task-recitation-tuning
    name: "Tune D9 mid-task recitation frequency"
    category: legacy
    status: retired_on_vnext_path
    retired_by_wp: "WP-030"
    retirement_packet: ".towow/evidence/wp-030/retire-tool-call-counter.json"
    purpose: |
      Historically: `export TOWOW_RECITATION_EVERY=N` tuned the interval at which
      tool-call-counter.py injected constitutional recitations. The reciter was retired in
      WP-030 (replaced by pointer-based precompact.py, WP-028). On the vNext path this env
      var is a no-op. Legacy .claude/ sessions still honor it until Phase G full cutover.

  # Entry #5. Mixed status — each sub-file re-evaluated.
  - id: harness-metrics-view
    name: "Inspect cumulative metrics"
    category: metrics
    status: active_with_retirements_in_flight
    purpose: |
      Read-only inspection of metrics that v5 hooks write under .towow/metrics/. Some writers
      have retired; their files stop updating but remain for historical inspection.
    entries:
      - file: ".towow/metrics/tool-call-counter.txt"
        writer: "tool-call-counter.py"
        writer_status: retired_on_vnext_path
        retired_by_wp: "WP-030"
        invocation: "cat .towow/metrics/tool-call-counter.txt"
        notes: "File frozen on vNext; legacy sessions still append."

      - file: ".towow/metrics/guard-events.jsonl"
        writer: "guard-feedback.py"
        writer_status: active
        invocation: "wc -l .towow/metrics/guard-events.jsonl"

      - file: ".towow/metrics/stop-events.jsonl"
        writer: "stop-evaluator.py"
        writer_status: active_pending_retirement
        pending_retire_wp: "WP-033"
        invocation: "wc -l .towow/metrics/stop-events.jsonl"

      - file: ".towow/metrics/tool-failures.jsonl"
        writer: "failure-analyzer.py"
        writer_status: retired_on_vnext_path
        retired_by_wp: "WP-032"
        retirement_packet: ".towow/evidence/wp-032/retire-failure-analyzer.json"
        invocation: "wc -l .towow/metrics/tool-failures.jsonl"
        notes: "File frozen on vNext; replaced by evidence-emit.py step-packet blockers. Legacy sessions still append."

      - file: ".towow/metrics/initializer-events.jsonl"
        writer: "capability-router.py (or wp-init path)"
        writer_status: active
        invocation: "wc -l .towow/metrics/initializer-events.jsonl"

discoverability_contract: |
  A consumer who knows nothing about this substrate should be able to invoke `/toolkit` and
  learn the full surface of .towow/ pull-tooling. Every entry is either (a) active and
  actionable or (b) explicitly retired with a pointer to the retirement packet — there is no
  "dead link" state. When a writer retires, the corresponding entry here flips to a retired
  status with retired_by_wp and retirement_packet filled; do not silently delete entries.

amendment_protocol: |
  Add an entry when a new .towow/ pull-tool ships (new script, new metrics file, new proposal
  channel). Flip an entry to retired when its writer retires, keeping the historical record.
  This file is NOT source-of-truth for what's active — the retirement packets in
  .towow/evidence/ are. This file is a navigation index that points at those truths.
