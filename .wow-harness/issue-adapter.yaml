# issue-adapter.yaml — project-level config for scripts/guard-feedback.py
#
# PostToolUse guard-feedback: enabled: true runs context routing + guards.
# Set enabled: false for a pure noop (e.g. third-party installs from bundle).
#
# Future: optional ``routes`` / ``guards`` below for project-specific wiring.

enabled: true

# When enabled, point fragments_dir to where your context fragments live.
# Each fragment is a markdown file that gets injected into Claude's context
# when the matching file is edited.
fragments_dir: scripts/context-fragments

# routes: file-glob → fragment-name pairs (reserved; optional future extension)
# Example:
#   routes:
#     - pattern: "backend/**/*.py"
#       fragment: "backend-conventions.md"
routes: []

# guards: file-glob → script pairs. Scripts exit non-zero on failure.
# Example:
#   guards:
#     - path_pattern: "backend/**"
#       script: scripts/checks/check_api_types.py
guards: []

# Where to append JSONL metric events. Can be relative to project root or absolute.
metrics_file: .wow-harness/state/metrics/guard-events.jsonl
